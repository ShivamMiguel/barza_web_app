<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#ff9156"/>
  
  <!-- Search icon with connecting lines -->
  <!-- Top-left circle (search) -->
  <circle cx="70" cy="70" r="20" fill="none" stroke="white" stroke-width="8"/>
  
  <!-- Bottom-right circle (connect point) -->
  <circle cx="130" cy="130" r="20" fill="none" stroke="white" stroke-width="8"/>
  
  <!-- Connecting line from top-left circle to bottom-right circle -->
  <line x1="87" y1="87" x2="113" y2="113" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Extended line from bottom-right going down-right (like a search handle) -->
  <line x1="147" y1="147" x2="175" y2="175" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
